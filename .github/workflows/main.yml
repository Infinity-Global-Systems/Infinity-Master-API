name: Sovereign-Empire-Control
on:
  workflow_dispatch: # للتشغيل اليدوي بضغطة زر

jobs:
  Sovereign-Audit-Job:
    runs-on: ubuntu-latest
    steps:
      - name: 🛰️ [STEP 1] Fetching Army from GitHub
        uses: actions/checkout@v3

      - name: 🐍 [STEP 2] Setting up Python Intelligence
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📂 [STEP 3] Infrastructure Initialization
        run: |
          echo "🔱 Initializing System Files..."
          touch audit_log.txt
          ls -R # هذا الأمر سيكشف لنا كل الملفات المخفية والموجودة

      - name: 🔍 [STEP 4] Deep System Audit
        run: |
          if [ -f "system_audit.py" ]; then
            python3 system_audit.py
          else
            echo "❌ CRITICAL: system_audit.py not found in root!"
          fi

      - name: 💰 [STEP 5] Execute Finance Node
        run: |
          if [ -f "Sovereign_FinNet.py" ]; then
            python3 Sovereign_FinNet.py
          else
            echo "⚠️ WARNING: Sovereign_FinNet.py is missing!"
          fi

      - name: 🏛️ [STEP 6] Deploy Master Gateway
        run: |
          if [ -f "gateway.py" ]; then
            python3 gateway.py
          else
            echo "❌ ERROR: Master gateway.py is missing!"
          fi

      - name: 📄 [STEP 7] Final Log Display
        run: cat audit_log.txt

