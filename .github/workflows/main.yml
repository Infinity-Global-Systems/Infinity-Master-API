name: Sovereign Self-Evolution & Finance
on:
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Initialize Audit Log
        run: touch audit_log.txt # حل مشكلة الفشل السابقة

      - name: Run Finance Node
        run: python3 Sovereign_FinNet.py # تشغيل وحدة الأرباح

      - name: Run Master Gateway
        run: python3 gateway.py # تشغيل العقل المدبر

